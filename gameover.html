<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Over, New Escape Times</title>
    <link rel="stylesheet" href="styles/main.css">
    <style>
        body { padding-bottom: 0; background: #0f0305; color: #fff; }
        .gameover {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .gameover h1 {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 4.5rem;
            font-weight: 900;
            color: #c41e3a;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 1rem;
            line-height: 1;
        }
        .go-subtitle {
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 1.3rem;
            color: #999;
            font-style: italic;
            margin-bottom: 0.6rem;
        }
        .gameover p {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: #777;
            font-size: 0.95rem;
            margin-bottom: 2.5rem;
        }
        .btn-outline {
            background: transparent;
            color: #fff;
            border: 2px solid #c41e3a;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            padding: 0.75rem 2.2rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            transition: background 0.18s, color 0.18s;
            border-radius: 3px;
        }
        .btn-outline:hover { background: #c41e3a; color: #fff; }
    </style>
</head>
<body class="gameover-body">

    <div class="gameover">
        <h1>Time's Up</h1>
        <p class="go-subtitle">The story ends here.</p>
        <p>
            You ran out of time before solving all four puzzles.<br>
            The truth remains hidden in the headlines.
        </p>
        <button class="btn-outline" onclick="restartGame()">Try Again</button>
    </div>

    <script>
        function restartGame() {
            localStorage.removeItem('net_progression');
            localStorage.removeItem('net_start_time');
            window.location.href = 'index.html';
        }
    </script>

</body>
</html>
