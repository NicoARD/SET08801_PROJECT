<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Escape Times</title>
    <link rel="stylesheet" href="styles/main.css">
    <style>
        body {
            padding-bottom: 0;
            background: #1a1a2e;
            color: #fff;
        }
        .splash {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }
        .splash-logo {
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 4.5rem;
            font-weight: 900;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            line-height: 1.05;
            margin-bottom: 0.6rem;
        }
        .splash-logo span {
            display: block;
            width: 80%;
            border-bottom: 3px solid #c41e3a;
            margin: 0.4rem auto 0.2rem;
        }
        .splash-tagline {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 0.88rem;
            color: #999;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 3rem;
        }
        .splash-description {
            max-width: 480px;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 1rem;
            line-height: 1.75;
            color: #ccc;
            margin-bottom: 2.5rem;
        }
        .play-btn {
            background: #c41e3a;
            color: #fff;
            border: none;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 1rem 3.5rem;
            cursor: pointer;
            border-radius: 3px;
            transition: background 0.18s;
        }
        .play-btn:hover { background: #a01830; }
        @media (max-width: 768px) { .splash-logo { font-size: 2.8rem; } }
    </style>
</head>
<body class="splash-body">

    <div class="splash">
        <div class="splash-logo">
            New Escape<span></span>Times
        </div>
        <p class="splash-tagline">The News That Hides the Clues</p>

        <p class="splash-description">
            Browse the headlines of a fictional newspaper, uncover codes hidden
            within the articles, and escape before time runs out.<br><br>
            Four levels of puzzles await, disguised as breaking news.
        </p>

        <button class="play-btn" onclick="startGame()">Start Reading</button>
    </div>

    <script>
        function startGame() {
            localStorage.removeItem('net_progression');
            localStorage.removeItem('net_start_time');
            localStorage.setItem('net_start_time', Date.now());
            localStorage.setItem('net_level_start_time', Date.now());
            localStorage.setItem('net_progression', 1);
            window.location.href = 'level1/article1.html';
        }
    </script>

</body>
</html>
