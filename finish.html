<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Escape Times</title>
    <link rel="stylesheet" href="styles/main.css">
    <style>
        body { padding-bottom: 0; background: #020f04; color: #fff; }
        .finish {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .finish h1 {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 3.5rem;
            font-weight: 900;
            color: #4caf50;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 0.8rem;
            line-height: 1;
        }
        .finish-sub {
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 1.3rem;
            color: #aaa;
            font-style: italic;
            margin-bottom: 1.5rem;
        }
        .time-label {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: #555;
            margin-bottom: 0.2rem;
        }
        .time-display {
            font-family: 'Courier New', Courier, monospace;
            font-size: 2.5rem;
            color: #4caf50;
            margin: 0.5rem 0 2rem;
            letter-spacing: 0.1em;
        }
        .finish p {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: #666;
            font-size: 0.95rem;
            max-width: 440px;
            margin-bottom: 2rem;
            line-height: 1.7;
        }
        .btn-outline {
            background: transparent;
            color: #fff;
            border: 2px solid #c41e3a;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            padding: 0.75rem 2.2rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            transition: background 0.18s, color 0.18s;
            border-radius: 3px;
        }
        .btn-outline:hover { background: #c41e3a; color: #fff; }
    </style>
</head>
<body class="finish-body">

    <div class="finish">
        <h1>You Escaped</h1>
        <p class="finish-sub">All four puzzles solved. The truth is yours.</p>

        <p class="time-label">Your time</p>
        <div class="time-display" id="elapsed">--:--</div>

        <button class="btn-outline" onclick="playAgain()">Play Again</button>
    </div>

    <script>
        (function () {
            const startTime = parseInt(localStorage.getItem('net_start_time') || '0', 10);
            if (startTime) {
                const elapsed = Date.now() - startTime;
                const mins = Math.floor(elapsed / 60000);
                const secs = Math.floor((elapsed % 60000) / 1000);
                document.getElementById('elapsed').textContent =
                    String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
            }
        })();

        function playAgain() {
            localStorage.removeItem('net_progression');
            localStorage.removeItem('net_start_time');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
